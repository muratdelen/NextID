services:
  nextlife-db:
    image: postgres:16
    container_name: nextlife-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${NEXTLIFE_DB_USER}
      POSTGRES_PASSWORD: ${NEXTLIFE_DB_PASSWORD}
      POSTGRES_DB: ${NEXTLIFE_DB_NAME}
    ports:
      - "${NEXTLIFE_DB_PORT}:5432"
    volumes:
      - nextlife_db_data:/var/lib/postgresql/data

  nextid-db:
    image: postgres:16
    container_name: nextid-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NEXTID_DB_NAME}
      POSTGRES_USER: ${NEXTID_DB_USER}
      POSTGRES_PASSWORD: ${NEXTID_DB_PASSWORD}
    volumes:
      - nextid_db_data:/var/lib/postgresql/data

  nextid:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXTID_BASE_VERSION: ${NEXTID_BASE_VERSION}
    image: nextid:local
    container_name: nextid
    restart: unless-stopped
    command:
      - start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${NEXTID_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${NEXTID_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://nextid-db:5432/${NEXTID_DB_NAME}
      KC_DB_USERNAME: ${NEXTID_DB_USER}
      KC_DB_PASSWORD: ${NEXTID_DB_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${NEXTID_HTTP_PORT}:8080"
    depends_on:
      - nextid-db

volumes:
  nextlife_db_data:
  nextid_db_data:
