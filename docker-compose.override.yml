# =========================================================
# NextID + NextLog kalıcı entegrasyon katmanı
#
# Docker Compose bu dosyayı otomatik okur.
# nextid-core image build edilirken NextLog listener jar dosyası
# otomatik olarak /opt/keycloak/providers içine eklenir.
# =========================================================

services:
  nextid-core:
    build:
      context: .
      dockerfile: identity/nextid/Dockerfile
      args:
        NEXTID_CORE_IMAGE_TAG: ${NEXTID_CORE_IMAGE_TAG:-latest}
    image: ghcr.io/muratdelen/nextid:${NEXTID_IMAGE_TAG:-local}
    environment:
      NEXTLOG_AUDIT_URL: ${NEXTLOG_AUDIT_URL:-http://next-log-service:8092/api/audit-events}
      NEXTLOG_MODULE: ${NEXTLOG_MODULE:-nextid}
