# =========================================================
# NextID runtime override
#
# Docker Compose bu dosyayı otomatik okur. Bu dosya artık
# zorunlu image build işlemi yapmaz; temel NextID servisini
# stabil çalıştırmak için yalnızca runtime değişkenleri ekler.
#
# NextLog listener jar ile build almak istersen:
# docker compose -f docker-compose.yml -f docker-compose.nextlog.yml up -d --build
# =========================================================

services:
  nextid-core:
    environment:
      NEXTLOG_AUDIT_URL: ${NEXTLOG_AUDIT_URL:-http://nextlog.harran.edu.tr/api/audit-events}
      NEXTLOG_MODULE: ${NEXTLOG_MODULE:-nextid}
      NEXTLOG_INGEST_API_KEY: ${NEXTLOG_INGEST_API_KEY:-dev-nextlog-secret}
