name: Build and Publish NextId

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: muratdelen/nextid
  NEXTID_CORE_BASE_IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push NextId image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: identity/nextid/Dockerfile
          push: true
          build-args: |
            NEXTID_CORE_IMAGE_TAG=${{ env.NEXTID_CORE_BASE_IMAGE_TAG }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
